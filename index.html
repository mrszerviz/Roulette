<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prémium Európai Rulett</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="casino-container">
        <!-- Felső sáv: Egyenleg és tét -->
        <header>
            <div class="info-box">EGYENLEG: <span id="balance">10000</span> €</div>
            <div class="logo">ROULETTE</div>
            <div class="info-box">ÖSSZES TÉT: <span id="total-bet">0</span> €</div>
        </header>

        <main>
            <!-- Rulettkerék rész -->
            <div class="wheel-section">
                <canvas id="wheel" width="300" height="300"></canvas>
                <div class="pointer">▼</div>
                <button id="spin-btn">PÖRGETÉS</button>
            </div>

            <!-- Státusz üzenet -->
            <div id="status-message">Tedd meg a tétjeidet!</div>

            <!-- Zseton választó -->
            <div class="chips-container">
                <div class="chip active" data-value="1">1</div>
                <div class="chip" data-value="5">5</div>
                <div class="chip" data-value="10">10</div>
                <div class="chip" data-value="50">50</div>
                <div class="chip" data-value="100">100</div>
            </div>

            <!-- Fogadási tábla -->
            <div class="betting-board">
                <!-- Nulla (0) gomb -->
                <div class="cell green zero" data-bet="0">0</div>
                
                <!-- Számok rácsa -->
                <div class="numbers-grid">
                    <!-- 3-as sor -->
                    <div class="cell red" data-bet="3">3</div>
                    <div class="cell black" data-bet="6">6</div>
                    <div class="cell red" data-bet="9">9</div>
                    <div class="cell red" data-bet="12">12</div>
                    <div class="cell black" data-bet="15">15</div>
                    <div class="cell red" data-bet="18">18</div>
                    <div class="cell red" data-bet="21">21</div>
                    <div class="cell black" data-bet="24">24</div>
                    <div class="cell red" data-bet="27">27</div>
                    <div class="cell red" data-bet="30">30</div>
                    <div class="cell black" data-bet="33">33</div>
                    <div class="cell red" data-bet="36">36</div>

                    <!-- 2-es sor -->
                    <div class="cell black" data-bet="2">2</div>
                    <div class="cell red" data-bet="5">5</div>
                    <div class="cell black" data-bet="8">8</div>
                    <div class="cell black" data-bet="11">11</div>
                    <div class="cell red" data-bet="14">14</div>
                    <div class="cell black" data-bet="17">17</div>
                    <div class="cell black" data-bet="20">20</div>
                    <div class="cell red" data-bet="23">23</div>
                    <div class="cell black" data-bet="26">26</div>
                    <div class="cell black" data-bet="29">29</div>
                    <div class="cell red" data-bet="32">32</div>
                    <div class="cell black" data-bet="35">35</div>

                    <!-- 1-es sor -->
                    <div class="cell red" data-bet="1">1</div>
                    <div class="cell black" data-bet="4">4</div>
                    <div class="cell red" data-bet="7">7</div>
                    <div class="cell black" data-bet="10">10</div>
                    <div class="cell black" data-bet="13">13</div>
                    <div class="cell red" data-bet="16">16</div>
                    <div class="cell red" data-bet="19">19</div>
                    <div class="cell black" data-bet="22">22</div>
                    <div class="cell red" data-bet="25">25</div>
                    <div class="cell red" data-bet="28">28</div>
                    <div class="cell black" data-bet="31">31</div>
                    <div class="cell red" data-bet="34">34</div>
                </div>

                <!-- Külső mezők (Páros/Páratlan, Piros/Fekete) -->
                <div class="outside-bets">
                    <div class="cell outside" data-bet="even">PÁROS</div>
                    <div class="cell outside red" data-bet="red">PIROS</div>
                    <div class="cell outside black" data-bet="black">FEKETE</div>
                    <div class="cell outside" data-bet="odd">PÁRATLAN</div>
                </div>
            </div>

            <!-- Törlés gomb -->
            <button id="clear-btn">Tétek törlése</button>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
