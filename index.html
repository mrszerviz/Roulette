<!DOCTYPE html>
<html lang="hu">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>European Roulette</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<h1>🎰 European Roulette</h1>


<div class="game">


<div class="wheel-container">

<div class="pointer"></div>

<canvas id="wheel" width="500" height="500"></canvas>

</div>



<div class="panel">


<h2>
💰 Egyenleg:
<span id="money">1000</span> Ft
</h2>


<label>Tét:</label>

<select id="betAmount">

<option value="10">10 Ft</option>
<option value="50">50 Ft</option>
<option value="100" selected>100 Ft</option>
<option value="500">500 Ft</option>

</select>



<h3>
Fogadás:
<span id="selectedBet">
nincs
</span>
</h3>



<div class="outside">

<button onclick="setBet('red')">
🔴 Piros
</button>

<button onclick="setBet('black')">
⚫ Fekete
</button>

<button onclick="setBet('even')">
Páros
</button>

<button onclick="setBet('odd')">
Páratlan
</button>

</div>



<h3>Szám:</h3>

<div id="numbers"></div>



<button class="spin" onclick="spin()">
🎡 PÖRGETÉS
</button>


<h2 id="message"></h2>


</div>


</div>



<script src="script.js"></script>


</body>
</html>
