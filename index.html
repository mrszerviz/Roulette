<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Roulette</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game">

<h1>🎰 Advanced Roulette</h1>

<div id="wheel">
    <div id="resultNumber">0</div>
</div>


<div class="panel">

<h3>Egyenleg:
<span id="money">1000</span> Ft
</h3>

<h3>Tét</h3>

<select id="betAmount">
<option value="10">10 Ft</option>
<option value="50">50 Ft</option>
<option value="100" selected>100 Ft</option>
<option value="500">500 Ft</option>
</select>


<h3>Fogadás</h3>

<div class="buttons">

<button onclick="setBet('red')">🔴 Piros</button>
<button onclick="setBet('black')">⚫ Fekete</button>

<button onclick="setBet('even')">
Páros
</button>

<button onclick="setBet('odd')">
Páratlan
</button>

</div>


<h3>Szám választás</h3>

<div id="numbers"></div>


<button class="spin" onclick="spin()">
PÖRGETÉS
</button>


<h2 id="message"></h2>


<hr>

<h3>Statisztika</h3>

<p>
Játékok:
<span id="games">0</span>
</p>

<p>
Nyerések:
<span id="wins">0</span>
</p>

<p>
Veszteségek:
<span id="losses">0</span>
</p>

<p>
RTP:
<span id="rtp">0</span>%
</p>


</div>

</div>


<script src="script.js"></script>

</body>
</html>
