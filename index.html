<!DOCTYPE html>
<html lang="hu">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D Roulette Simulator</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="game">


<h1>🎰 3D Roulette Simulator</h1>


<div class="casino-table">


<div id="wheel">

<div id="resultNumber">
0
</div>

</div>



<div class="roulette-board">


<button class="zero number"
onclick="chooseNumber(0)">
0
</button>


<div id="numbers"></div>



<div class="outside">


<button onclick="setBet('red',this)">
🔴 Piros
</button>


<button onclick="setBet('black',this)">
⚫ Fekete
</button>


<button onclick="setBet('even',this)">
Páros
</button>


<button onclick="setBet('odd',this)">
Páratlan
</button>


</div>


</div>


</div>




<div class="panel">


<h2>
💰 Egyenleg:
<span id="money">
1000
</span>
Ft
</h2>



<label>
Tét:
</label>


<select id="amount" onchange="changeAmount()">

<option value="10">
10 Ft
</option>

<option value="50">
50 Ft
</option>

<option value="100" selected>
100 Ft
</option>

<option value="500">
500 Ft
</option>

</select>


<p>
Aktuális tét:
<span id="currentAmount">
100
</span>
Ft
</p>



<button class="spin"
onclick="spin()">
🎡 PÖRGETÉS
</button>



<h2 id="message">
Válassz fogadást!
</h2>



<hr>


<h3>Statisztika</h3>


<p>
Játékok:
<span id="games">
0
</span>
</p>


<p>
Nyerések:
<span id="wins">
0
</span>
</p>


<p>
Veszteségek:
<span id="losses">
0
</span>
</p>


<p>
RTP:
<span id="rtp">
0
</span>%
</p>



</div>


</div>


<script src="script.js"></script>


</body>
</html>
