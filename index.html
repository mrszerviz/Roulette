<!DOCTYPE html>
<html lang="hu">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>European Roulette</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<h1>🎰 European Roulette 3D</h1>


<div class="game">


<canvas id="wheel" width="500" height="500"></canvas>



<div class="panel">


<h2>
💰 Egyenleg:
<span id="money">1000</span> Ft
</h2>



<label>Tét:</label>


<select id="betAmount">

<option value="10">
10 Ft
</option>

<option value="50">
50 Ft
</option>

<option value="100" selected>
100 Ft
</option>

<option value="500">
500 Ft
</option>

</select>


<p>

Aktuális tét:
<b>
<span id="showBet">
100
</span>
Ft
</b>

</p>



<h3>
Fogadás:
<span id="selectedBet">
nincs
</span>
</h3>



<div class="buttons">


<button onclick="colorBet('red')">
🔴 Piros
</button>


<button onclick="colorBet('black')">
⚫ Fekete
</button>


<button onclick="colorBet('even')">
Páros
</button>


<button onclick="colorBet('odd')">
Páratlan
</button>


</div>



<div id="numbers"></div>



<button class="spin" onclick="spin()">

🎡 PÖRGETÉS

</button>



<h2 id="message"></h2>



<hr>


<p>
Játékok:
<span id="games">0</span>
</p>


<p>
Nyerések:
<span id="wins">0</span>
</p>


<p>
Veszteségek:
<span id="losses">0</span>
</p>


</div>


</div>


<script src="script.js"></script>


</body>

</html>
